<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Manage Inventory | Pandey Traders</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-dark": "#0a110b",
                        "accent-gold": "#d4af37",
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Lexend', sans-serif; }
        .inventory-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .inventory-card:hover { transform: translateX(10px); }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">

    <header class="flex items-center justify-between border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-xl px-6 md:px-12 py-4 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="bg-primary p-2 rounded-2xl text-white shadow-xl shadow-primary/30">
                <span class="material-symbols-outlined text-2xl">inventory_2</span>
            </div>
            <div>
                <h2 class="text-primary text-xl font-black tracking-tighter leading-none uppercase">Pandey Traders</h2>
                <span class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase">Stock Management</span>
            </div>
        </div>
        <a href="Vendor-Dashboard.html" class="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-primary transition-all">
            <span class="material-symbols-outlined text-lg">dashboard</span> Dashboard
        </a>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <div class="lg:col-span-1">
                <div class="sticky top-28 space-y-6">
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border border-slate-200 dark:border-white/5 shadow-sm">
                        <h3 class="text-xl font-black mb-6 tracking-tight">Add <span class="text-primary">Stock</span></h3>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Product Name</label>
                                <input type="text" id="pName" placeholder="e.g. IIL Mission" 
                                class="w-full mt-1 px-4 py-3.5 bg-slate-50 dark:bg-white/5 border-none rounded-2xl ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary outline-none text-sm transition-all">
                            </div>

                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Category</label>
                                <select id="pCat" class="w-full mt-1 px-4 py-3.5 bg-slate-50 dark:bg-white/5 border-none rounded-2xl ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary outline-none text-sm">
                                    <option>Insecticide</option>
                                    <option>Fertilizer</option>
                                    <option>Seeds</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Quantity</label>
                                    <input type="number" id="pQty" placeholder="0" class="w-full mt-1 px-4 py-3.5 bg-slate-50 dark:bg-white/5 border-none rounded-2xl ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary outline-none text-sm">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Price (₹)</label>
                                    <input type="number" id="pPrice" placeholder="0" class="w-full mt-1 px-4 py-3.5 bg-slate-50 dark:bg-white/5 border-none rounded-2xl ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary outline-none text-sm">
                                </div>
                            </div>

                            <button onclick="addItem()" class="w-full mt-6 py-4 bg-primary text-white text-xs font-black rounded-2xl shadow-lg shadow-primary/20 hover:bg-primary-dark transition-all active:scale-95">
                                UPDATE INVENTORY
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">Live <span class="text-primary">Status</span></h2>
                    <div class="flex gap-2">
                        <span class="px-3 py-1 bg-white dark:bg-white/5 rounded-lg text-[10px] font-black border border-slate-100 dark:border-white/10">TOTAL ITEMS: 2</span>
                    </div>
                </div>

                <div id="inventoryList" class="space-y-4">
                    <div class="inventory-card bg-white dark:bg-slate-900 p-6 rounded-[2rem] border-l-8 border-primary shadow-sm flex items-center justify-between group">
                        <div class="flex items-center gap-5">
                            <div class="size-14 bg-primary/10 text-primary rounded-2xl flex items-center justify-center">
                                <span class="material-symbols-outlined text-3xl">pest_control</span>
                            </div>
                            <div>
                                <h4 class="font-black text-lg leading-none">IIL Mission</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Insecticide • ₹1,850/unit</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="px-4 py-2 bg-primary/10 text-primary rounded-xl text-xs font-black">45 Units</span>
                        </div>
                    </div>

                    <div class="inventory-card bg-white dark:bg-slate-900 p-6 rounded-[2rem] border-l-8 border-red-500 shadow-sm flex items-center justify-between group">
                        <div class="flex items-center gap-5">
                            <div class="size-14 bg-red-100 dark:bg-red-900/20 text-red-500 rounded-2xl flex items-center justify-center">
                                <span class="material-symbols-outlined text-3xl">compost</span>
                            </div>
                            <div>
                                <h4 class="font-black text-lg leading-none">DAP Fertilizer</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 text-red-400">Low Stock Alert • ₹1,200/bag</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="px-4 py-2 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-xl text-xs font-black">02 Bags</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-12 text-center opacity-50">
        <p class="text-[10px] font-black uppercase tracking-[0.3em]">Pandey Traders Internal Inventory System</p>
    </footer>

    <script>
        function addItem() {
            const name = document.getElementById('pName').value;
            const qty = document.getElementById('pQty').value;
            const price = document.getElementById('pPrice').value;
            const cat = document.getElementById('pCat').value;

            if(name && qty && price) {
                const list = document.getElementById('inventoryList');
                const div = document.createElement('div');
                div.className = 'inventory-card bg-white dark:bg-slate-900 p-6 rounded-[2rem] border-l-8 border-primary shadow-sm flex items-center justify-between animate-fade-in-right';
                
                div.innerHTML = `
                    <div class="flex items-center gap-5">
                        <div class="size-14 bg-primary/10 text-primary rounded-2xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-3xl">inventory</span>
                        </div>
                        <div>
                            <h4 class="font-black text-lg leading-none">${name}</h4>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${cat} • ₹${price}/unit</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="px-4 py-2 bg-primary/10 text-primary rounded-xl text-xs font-black">${qty} Units</span>
                    </div>
                `;
                list.prepend(div);
                
                // Clear inputs
                document.getElementById('pName').value = '';
                document.getElementById('pQty').value = '';
                document.getElementById('pPrice').value = '';
                
                alert("Stock Entry Updated!");
            } else {
                alert("Kripya saari jankari bharein!");
            }
        }
    </script>
</body>
</html>
