<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join the Revolution | Jaymani Krishi Sewa</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-dark": "#0a110b",
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Lexend', sans-serif; }
        .auth-bg { background: radial-gradient(circle at top right, rgba(47, 127, 51, 0.15), transparent), radial-gradient(circle at bottom left, rgba(47, 127, 51, 0.05), transparent); }
    </style>
</head>
<body class="bg-white dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen auth-bg flex flex-col">

    <header class="px-8 py-6 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="bg-primary p-1.5 rounded-lg text-white">
                <span class="material-symbols-outlined text-xl">agriculture</span>
            </div>
            <h2 class="text-primary text-xl font-black tracking-tighter uppercase">Jaymani</h2>
        </div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Step 01: Identity</p>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-xl">
            <div class="flex gap-2 mb-10">
                <div class="h-1.5 flex-1 bg-primary rounded-full"></div>
                <div class="h-1.5 flex-1 bg-slate-200 dark:bg-white/10 rounded-full"></div>
                <div class="h-1.5 flex-1 bg-slate-200 dark:bg-white/10 rounded-full"></div>
            </div>

            <div class="mb-10 text-center">
                <h1 class="text-4xl font-black tracking-tight mb-2">Create your <span class="text-primary">Digital Pehchan</span></h1>
                <p class="text-slate-500 font-medium">Join 5000+ farmers across the region.</p>
            </div>

            <div class="bg-white dark:bg-slate-900/50 p-8 md:p-12 rounded-[3rem] border border-slate-200 dark:border-white/5 shadow-2xl backdrop-blur-xl">
                <form onsubmit="handleSignup(event)" class="space-y-6">
                    <div class="bg-slate-100 dark:bg-white/5 p-1.5 rounded-2xl flex gap-2">
                        <button type="button" onclick="setRole('farmer')" id="role-farmer" class="flex-1 py-3 text-xs font-black rounded-xl transition-all bg-white dark:bg-white/10 shadow-sm text-primary">FARMER</button>
                        <button type="button" onclick="setRole('vendor')" id="role-vendor" class="flex-1 py-3 text-xs font-black rounded-xl transition-all text-slate-400">RETAILER</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                            <input type="text" required placeholder="Enter Name" class="w-full mt-2 px-5 py-4 bg-slate-50 dark:bg-white/5 border-none rounded-2xl ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary outline-none transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mobile Number</label>
                            <input type="tel" required placeholder="+91" class="w-full mt-2 px-5 py-4 bg-slate-50 dark:bg-white/5 border-none rounded-2xl ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">ID Number (Aadhaar / Kisan Card)</label>
                        <div class="relative mt-2">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">badge</span>
                            <input type="text" required placeholder="XXXX-XXXX-XXXX" class="w-full pl-12 pr-5 py-4 bg-slate-50 dark:bg-white/5 border-none rounded-2xl ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary outline-none transition-all">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full py-5 bg-primary text-white text-xs font-black rounded-[2rem] shadow-xl shadow-primary/20 hover:bg-primary-dark transition-all active:scale-95 flex items-center justify-center gap-3">
                            CONTINUE TO VERIFY <span class="material-symbols-outlined text-lg">arrow_forward</span>
                        </button>
                    </div>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-sm text-slate-500 font-medium">Already have an account? <a href="Login.html" class="text-primary font-bold hover:underline">Sign In</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
        Secured by Jaymani Encryption Protocol
    </footer>

    <script>
        let selectedRole = 'farmer';

        function setRole(role) {
            selectedRole = role;
            const fBtn = document.getElementById('role-farmer');
            const vBtn = document.getElementById('role-vendor');

            if (role === 'farmer') {
                fBtn.className = "flex-1 py-3 text-xs font-black rounded-xl transition-all bg-white dark:bg-white/10 shadow-sm text-primary";
                vBtn.className = "flex-1 py-3 text-xs font-black rounded-xl transition-all text-slate-400";
            } else {
                vBtn.className = "flex-1 py-3 text-xs font-black rounded-xl transition-all bg-white dark:bg-white/10 shadow-sm text-primary";
                fBtn.className = "flex-1 py-3 text-xs font-black rounded-xl transition-all text-slate-400";
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            // Store role in session to help the next page
            sessionStorage.setItem("pendingRole", selectedRole);
            alert("Verification OTP sent to your mobile!");
            window.location.href = "Login.html"; 
        }
    </script>
</body>
</html>
