<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Success | Jaymani Krishi Sewa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#2f7f33", "background-dark": "#0a110b" } } } }
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #0a110b; color: white; }
        .success-icon { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full text-center bg-white/5 backdrop-blur-xl p-10 rounded-[3rem] border border-white/10 shadow-2xl">
        <div class="success-icon bg-primary w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg shadow-primary/30">
            <span class="text-5xl text-white">✓</span>
        </div>
        
        <h1 class="text-3xl font-black text-white mb-2 uppercase">Order Reserved!</h1>
        <p class="text-slate-400 text-sm mb-8">आपका स्टॉक **Pandey Traders** पर सुरक्षित कर लिया गया है।</p>

        <div class="bg-white/5 rounded-2xl p-6 mb-8 text-left space-y-3">
            <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-500">
                <span>Order ID:</span> <span class="text-white">#JMS-9920</span>
            </div>
            <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-500">
                <span>Total Amount:</span> <span class="text-primary text-lg">₹1,330</span>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="window.location.href='Invoice-Gen.html'" class="w-full py-4 bg-primary text-white font-black rounded-2xl hover:shadow-lg transition-all active:scale-95">VIEW INVOICE</button>
            <button onclick="window.location.href='Marketplace.html'" class="w-full py-4 bg-white/5 text-slate-300 font-bold rounded-2xl border border-white/10 hover:bg-white/10 transition">Back to Market</button>
        </div>
    </div>
</body>
</html>
